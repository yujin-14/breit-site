<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="description" content="タイプ診断で、自分の考え方の傾向を見つけるBreitの自己分析ページ。">
<meta name="theme-color" content="#1A2238">
<title>Breit - タイプ診断</title>
<link rel="icon" type="image/png" href="favicon.png">
<link rel="apple-touch-icon" href="favicon.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho+B1:wght@500;700;800&family=Zen+Kaku+Gothic+New:wght@400;500;700;900&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --paper:#F7F8F5; --ink:#1A2238; --ink-soft:#4A5170;
    --teal:#2F7D6B; --teal-deep:#245F52; --coral:#E8674F; --amber:#D9A441;
    --line:#DEDCD0; --card:#FFFFFF;
    --shadow:0 1px 2px rgba(26,34,56,.04),0 6px 16px rgba(26,34,56,.06);
  }
  *{box-sizing:border-box;min-width:0;}
  body{margin:0;background:var(--paper);color:var(--ink);font-family:'Zen Kaku Gothic New',sans-serif;-webkit-font-smoothing:antialiased;}
  .mono{font-family:'JetBrains Mono',monospace;}
  .serif{font-family:'Shippori Mincho B1',serif;}
  .app{display:grid;grid-template-columns:76px 1fr;min-height:100vh;}

  .nav{background:var(--ink);padding:24px 0;display:flex;flex-direction:column;align-items:center;gap:6px;}
  .nav-logo{width:36px;height:36px;border-radius:8px;background:var(--teal);color:#fff;display:flex;align-items:center;justify-content:center;font-family:'Shippori Mincho B1',serif;font-weight:800;font-size:16px;margin-bottom:28px;flex-shrink:0;}
  .nav-items{display:flex;flex-direction:column;gap:6px;width:100%;align-items:center;}
  .nav-item{width:52px;padding:10px 0 8px;border-radius:10px 10px 0 0;display:flex;flex-direction:column;align-items:center;gap:4px;color:#8891AC;cursor:pointer;position:relative;flex-shrink:0;}
  .nav-item svg{width:19px;height:19px;stroke:currentColor;fill:none;stroke-width:1.6;}
  .nav-item span{font-size:9.5px;white-space:nowrap;}
  .nav-item.active{color:#fff;background:var(--teal);}
  .nav-item.active::after{content:"";position:absolute;right:-6px;top:0;bottom:0;width:6px;background:var(--teal);clip-path:polygon(0 0,100% 50%,0 100%);}
  .nav-item.disabled{color:#4A5170;cursor:default;}
  .nav-tag{margin-top:auto;writing-mode:vertical-rl;color:#5A6382;font-size:9px;letter-spacing:.15em;padding-top:20px;flex-shrink:0;}

  main{padding:clamp(20px,4vw,40px) clamp(16px,5vw,56px) 100px;max-width:860px;width:100%;}
  .back-row{display:flex;flex-wrap:wrap;gap:12px;align-items:center;margin-bottom:18px;}
  .back-link{display:inline-flex;align-items:center;gap:6px;font-size:12.5px;color:var(--ink-soft);text-decoration:none;}
  .back-link svg{width:14px;height:14px;stroke:currentColor;fill:none;stroke-width:2;}
  .eyebrow{font-size:12px;color:var(--teal-deep);letter-spacing:.14em;font-weight:700;margin-bottom:8px;}
  h1{font-family:'Shippori Mincho B1',serif;font-weight:700;font-size:clamp(20px,3vw,28px);margin:0 0 8px;}
  .lead{color:var(--ink-soft);font-size:13.5px;margin:0 0 18px;line-height:1.8;max-width:60ch;}

  .status-banner{
    display:flex;flex-wrap:wrap;align-items:flex-start;gap:10px;
    background:var(--card);border:1px solid var(--line);border-radius:14px;
    padding:14px 16px;box-shadow:var(--shadow);margin-bottom:24px;
  }
  .status-chip{font-size:11px;font-weight:700;padding:4px 10px;border-radius:999px;background:#EAF2F0;color:var(--teal-deep);white-space:nowrap;}
  .status-text{font-size:12.5px;color:var(--ink-soft);line-height:1.8;}
  .status-text b{color:var(--ink);}

  .progress-wrap{position:sticky;top:0;background:linear-gradient(var(--paper),var(--paper) 84%,rgba(247,248,245,0));padding:10px 0 16px;z-index:5;margin-bottom:8px;}
  .progress-track{height:7px;background:#E3E0D2;border-radius:100px;overflow:hidden;}
  .progress-fill{height:100%;width:0%;background:var(--teal);border-radius:100px;transition:width .3s;}
  .progress-label{font-size:11.5px;color:var(--ink-soft);margin-top:6px;font-family:'JetBrains Mono',monospace;}

  .qcard{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:22px;box-shadow:var(--shadow);margin-bottom:16px;}
  .qnum{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--teal);margin-bottom:8px;}
  .qtext{font-size:15px;font-weight:700;margin-bottom:16px;line-height:1.7;}
  .options{display:flex;flex-direction:column;gap:10px;}
  .option{display:flex;gap:12px;align-items:flex-start;padding:14px 16px;border-radius:12px;border:1.6px solid var(--line);cursor:pointer;background:var(--paper);transition:.18s;}
  .option:hover{border-color:#C7C4B4;transform:translateY(-1px);}
  .option.sel{border-color:var(--teal);background:#EAF2F0;}
  .opt-tag{width:22px;height:22px;border-radius:50%;background:var(--card);border:1.6px solid var(--line);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:var(--ink-soft);flex-shrink:0;}
  .option.sel .opt-tag{background:var(--teal);border-color:var(--teal);color:#fff;}
  .opt-text{font-size:13.5px;line-height:1.65;}

  .sticky-actions{position:sticky;bottom:0;background:linear-gradient(to top,var(--paper) 60%,transparent);padding:20px 0 4px;display:flex;justify-content:center;}
  .action-wrap{display:flex;flex-wrap:wrap;gap:10px;justify-content:center;}
  .btn{border:none;border-radius:11px;padding:14px 24px;font-weight:700;font-size:14px;font-family:'Zen Kaku Gothic New';cursor:pointer;}
  .btn-primary{background:#C7C4B4;color:#fff;cursor:not-allowed;}
  .btn-primary.ready{background:var(--teal);cursor:pointer;}
  .btn-ghost{background:#fff;color:var(--ink-soft);border:1.6px solid var(--line);}

  .result-panel{display:none;background:linear-gradient(135deg,var(--ink),#232C48);color:#fff;border-radius:18px;padding:26px;margin-top:24px;box-shadow:var(--shadow);}
  .result-eyebrow{font-size:11px;color:#9FE3D0;letter-spacing:.12em;font-weight:700;margin-bottom:12px;}
  .result-title{font-family:'Shippori Mincho B1',serif;font-size:24px;font-weight:700;margin-bottom:18px;}
  .result-bar-track{display:flex;height:14px;border-radius:100px;overflow:hidden;margin-bottom:10px;background:rgba(255,255,255,.08);}
  .result-labels{display:flex;justify-content:space-between;gap:10px;flex-wrap:wrap;font-size:12.5px;margin-bottom:18px;}
  .result-note{background:rgba(255,255,255,.08);border-radius:12px;padding:14px 16px;font-size:12.5px;line-height:1.9;color:#D5D8E4;white-space:pre-wrap;}
  .result-actions{display:flex;flex-wrap:wrap;gap:10px;margin-top:18px;}
  .result-cta{background:var(--teal);color:#fff;border:none;padding:12px 20px;border-radius:10px;font-weight:700;font-size:13.5px;cursor:pointer;font-family:'Zen Kaku Gothic New';text-decoration:none;display:inline-flex;align-items:center;justify-content:center;}
  .result-cta.secondary{background:#fff;color:var(--ink-soft);}

  @media (max-width:767px){
    .app{grid-template-columns:1fr;}
    .nav{flex-direction:row;padding:12px 14px;overflow-x:auto;justify-content:flex-start;gap:4px;position:sticky;top:0;z-index:10;}
    .nav-logo{margin-bottom:0;margin-right:8px;}
    .nav-items{flex-direction:row;width:auto;gap:4px;}
    .nav-item{width:auto;flex-direction:row;padding:8px 10px;border-radius:9px;gap:6px;}
    .nav-item.active::after{display:none;}
    .nav-item span{font-size:11px;}
    .nav-tag{display:none;}
    main{padding:16px 16px 90px;}
    .result-actions,.action-wrap{flex-direction:column;}
    .btn,.result-cta{width:100%;}
  }

/* BREIT BRAND */
.nav-logo{background:transparent !important;border-radius:0 !important;width:44px !important;height:44px !important;padding:0 !important;display:flex !important;align-items:center !important;justify-content:center !important;}
.nav-logo img{width:100%;height:100%;object-fit:contain;display:block;}
.brand-inline{display:inline-flex;align-items:center;gap:12px;flex-wrap:wrap;}
.brand-inline img{display:block;height:auto;}


/* BREIT BRAND SYSTEM */
.nav-logo{background:transparent !important;border-radius:0 !important;width:44px !important;height:44px !important;padding:0 !important;display:flex !important;align-items:center !important;justify-content:center !important;overflow:visible !important;}
.nav-logo .breit-svg{width:100% !important;height:100% !important;display:block;}
.breit-lockup{display:flex;align-items:center;gap:14px;flex-wrap:wrap;}
.breit-lockup--mono .breit-svg{width:58px;height:58px;flex:0 0 auto;}
.breit-lockup__word{font-family:'Cormorant Garamond','Shippori Mincho B1',serif;font-size:clamp(32px,4vw,48px);font-weight:600;letter-spacing:.02em;color:#2A2620;line-height:1;}
.breit-lockup__sub{font-size:12px;color:#6B675F;letter-spacing:.12em;line-height:1.7;}


/* FINAL UI POLISH */
:root{
  --shadow-soft:0 1px 2px rgba(26,34,56,.04),0 12px 28px rgba(26,34,56,.08);
  --surface-gap:clamp(18px,2.2vw,24px);
}
body{line-height:1.6;}
.app{grid-template-columns:84px minmax(0,1fr) !important;}
.nav{padding:26px 0 18px !important;gap:8px !important;}
.nav-logo{width:48px !important;height:48px !important;margin-bottom:24px !important;}
.nav-items{gap:8px !important;}
.nav-item{width:56px !important;padding:11px 0 10px !important;border-radius:14px 14px 0 0 !important;transition:background-color .18s ease,color .18s ease,transform .18s ease;}
.nav-item:hover{transform:translateY(-1px);}
.nav-item svg{width:20px !important;height:20px !important;}
.nav-item span{font-size:10px !important;letter-spacing:.03em !important;}
.nav-tag{padding-top:22px !important;line-height:1.55;}
main{padding:clamp(28px,4.6vw,52px) clamp(22px,5vw,60px) 96px !important;max-width:1240px !important;}
.top-row{gap:20px !important;align-items:flex-end !important;margin-bottom:clamp(20px,3vw,28px) !important;}
.greeting-eyebrow,.eyebrow,.coach-label,.cta-eyebrow,.label,.summary-label,.mini-label,.section-sub,.phase-chip,.chip{letter-spacing:.12em;}
h1,h1.greeting,.greeting{line-height:1.34 !important;letter-spacing:.01em;}
.lead,.hero-sub,.phase-text,.banner-text,.card-copy,.summary-sub,.mini-sub,.hero-note,.coach-copy,.cta-sub,.task-note,.fit-reason,.guide-text,.history-empty,.fw-sub,.sub,.banner-text,.check-text,.tl-sub,.insight-body,.hero-caption{line-height:1.9 !important;}
.grid,.stack,.summary-grid,.hero-grid,.content-grid,.bottom-grid,.matrix,.insight-grid,.reward-grid,.urgent-list,.guide-list,.history-list,.mini-list,.fw-list,.feature-list{gap:var(--surface-gap) !important;}
.card,.summary-card,.reward-panel,.history-panel,.coach-card,.hero-card,.side-card,.schedule-card,.list-card,.phase-banner,.banner,.goal-card,.cta,.hero-card,.reward-card,.summary-card,.urgent-card{border-radius:20px !important;box-shadow:var(--shadow-soft) !important;}
.card,.summary-card,.reward-panel,.history-panel,.coach-card,.hero-card,.side-card,.schedule-card,.list-card,.urgent-card{padding:clamp(20px,3vw,28px) !important;}
.hero-card,.cta,.goal-card{overflow:hidden;}
.card-head,.section-head,.hero-head{margin-bottom:16px !important;}
.card-title,.section-title,.hero-title,.coach-title,.cta-title{letter-spacing:.01em;}
.task,.company-row,.fw-row,.guide-item,.check-item,.history-row,.fit-row,.mini-row,.urgent-item,.metric,.mini,.insight-box,.tl-card,.day-card,.story-pill,.band-card{border-radius:16px !important;}
.task,.company-row{padding-left:8px !important;padding-right:8px !important;}
.task-title,.urgent-title,.fit-name,.history-title,.company-name,.tl-title,.fw-name,.main-val,.summary-main,.mini-main{line-height:1.7 !important;}
.add-btn,.ghost-btn,.link-btn,.cta-btn,.btn,.nav-cta{min-height:44px !important;padding:12px 18px !important;border-radius:12px !important;}
.view-btn,.filter-chip,.note-chip,.cta-chip,.coach-tag,.hero-chip,.band-chip,.phase-chip,.chip,.step-pill,.fit-pill,.badge,.urgent-pill,.status{border-radius:999px !important;}
a,button,[role="button"],.nav-item,.filter-chip,.view-btn,.check{transition:all .18s ease;}
a:hover,button:hover,[role="button"]:hover{filter:saturate(1.02);}
:focus-visible{outline:2px solid rgba(47,125,107,.45);outline-offset:2px;}
table{border-radius:20px !important;overflow:hidden;}
th,td{padding:14px 15px !important;line-height:1.8 !important;}
@media (max-width:1080px){
  main{padding-inline:20px !important;}
}
@media (max-width:767px){
  .app{grid-template-columns:1fr !important;}
  .nav{padding:10px 12px !important;gap:6px !important;}
  .nav-logo{width:40px !important;height:40px !important;margin-bottom:0 !important;margin-right:10px !important;}
  .nav-items{gap:6px !important;}
  .nav-item{width:auto !important;padding:9px 11px !important;border-radius:12px !important;}
  .nav-item:hover{transform:none;}
  .nav-item span{font-size:11px !important;}
  .nav-tag{display:none !important;}
  main{padding:18px 14px 56px !important;}
  .top-row{gap:14px !important;}
  .grid,.summary-grid,.hero-grid,.content-grid,.bottom-grid,.matrix,.insight-grid,.reward-grid,.urgent-list,.hero-metrics,.mini-metrics{gap:12px !important;}
  .card,.summary-card,.reward-panel,.history-panel,.coach-card,.hero-card,.side-card,.schedule-card,.list-card,.urgent-card{padding:18px !important;}
  .task,.company-row,.history-row,.guide-item,.check-item,.fit-row,.urgent-item{padding:14px !important;}
}

.nav-item{text-decoration:none;color:inherit;}

/* NAV TEXT FIX */
.nav-item,.nav-item:link,.nav-item:visited{color:rgba(255,255,255,.92) !important;text-decoration:none !important;}
.nav-item:hover{color:#fff !important;}
.nav-item.active,.nav-item.active:link,.nav-item.active:visited{color:#fff !important;}
.nav-item.disabled{color:#5A6382 !important;}
.nav-item svg{stroke:currentColor !important;}


.nav-logo{text-decoration:none;color:inherit;}

/* SELF ANALYSIS FINAL POLISH */
.lead{max-width:72ch;}
.path-banner,.flow-banner,.lock-banner,.status-banner{box-shadow:0 12px 28px rgba(26,34,56,.06);border:1px solid rgba(63,105,68,.12);}
.result-panel,.module,.year-card,.card{box-shadow:0 14px 30px rgba(26,34,56,.06);}
.result-panel p,.module-result,.module-desc,.card-sub{line-height:1.85;}
.rec-note{margin-top:12px;padding:10px 12px;border-radius:14px;background:rgba(244,238,226,.72);color:var(--muted);line-height:1.8;}
.module-result{display:-webkit-box;-webkit-box-orient:vertical;-webkit-line-clamp:4;overflow:hidden;}

  ["休日の過ごし方をイメージすると？","今日一日が充実していればそれでいい","事前に予定を立てて過ごしたい"],
  ["新しいことを始めるとき","まずやってみて、良ければ続ける","ゴールを決めてから逆算して計画する"],
  ["仕事を選ぶ基準として近いのは","日々の仕事にやりがい・納得感があること","将来なりたい自分に近づけること"],
  ["『5年後どうなっていたい？』と聞かれたら","うまく思い浮かばないことが多い","ある程度イメージが浮かぶ"],
  ["目標に対する感覚","目標を決めすぎると窮屈に感じる","明確な目標があるとモチベーションが上がる"],
  ["何かを頑張れた時を振り返ると","好きなこと・大事にしていることに向き合えた時","目指すゴールに近づけた実感があった時"],
  ["就活の軸として自然に感じるのは","自分が大切にしたい価値観に合うか","将来のキャリアプランに合うか"],
  ["計画通りにいかなくなった時","あまり気にせず、その時々で対応する","計画を立て直して軌道修正したい"],
  ["尊敬する人の共通点を考えると","自分らしく日々を大切に生きている人","明確なビジョンに向かって突き進む人"],
  ["『なぜその仕事をしたいのか』と聞かれたら","その仕事をしている時間や環境が自分に合うから","その先に実現したいことがあるから"],
  ["後悔しない決断とは","自分の納得感を大切にして選べたこと","描いた将来像に近づく選択ができたこと"]
];

const answers = new Array(questions.length).fill(null);
const container = document.getElementById('questions');
const submitBtn = document.getElementById('submitBtn');
const resultPanel = document.getElementById('resultPanel');

function readJson(key){
  try { return JSON.parse(localStorage.getItem(key)); } catch(e){ return null; }
}

function renderQuestions(){
  questions.forEach((q, i) => {
    const card = document.createElement('div');
    card.className = 'qcard';
    card.innerHTML = `
      <div class="qnum mono">Q${i+1} / ${questions.length}</div>
      <div class="qtext">${q[0]}</div>
      <div class="options">
        <div class="option" data-q="${i}" data-v="A"><div class="opt-tag">A</div><div class="opt-text">${q[1]}</div></div>
        <div class="option" data-q="${i}" data-v="B"><div class="opt-tag">B</div><div class="opt-text">${q[2]}</div></div>
      </div>`;
    container.appendChild(card);
  });
}

function syncSelections(){
  answers.forEach((val, qi) => {
    if(!val) return;
    document.querySelectorAll(`.option[data-q="${qi}"]`).forEach(o => o.classList.toggle('sel', o.dataset.v === val));
  });
}

function updateProgress(){
  const answered = answers.filter(a => a !== null).length;
  document.getElementById('progressFill').style.width = (answered/questions.length*100) + '%';
  document.getElementById('progressLabel').textContent = `${answered} / ${questions.length} 回答済み`;
  if(answered === questions.length){ submitBtn.classList.add('ready'); } else { submitBtn.classList.remove('ready'); }
}

function saveDraft(showAlert = false){
  localStorage.setItem(DRAFT_KEY, JSON.stringify({
    answers,
    answeredCount: answers.filter(a => a !== null).length,
    updatedAt: new Date().toISOString()
  }));
  if(showAlert) alert('下書きを入力しました');
}

function restoreSavedData(){
  const result = readJson(診断結果_KEY);
  const draft = readJson(DRAFT_KEY);
  const saved = (draft && Array.isArray(draft.answers) && draft.answers.some(Boolean)) ? draft : result;
  if(saved && Array.isArray(saved.answers)){
    saved.answers.forEach((v,i) => answers[i] = v || null);
    syncSelections();
    updateProgress();
    document.getElementById('statusChip').textContent = result ? '入力済み診断あり' : '下書き入力あり';
    document.getElementById('statusText').innerHTML = result
      ? '前回の診断結果が見つかったので、内容を復元しています。回答を変えて <b>再診断</b> することもできます。'
      : '途中入力された回答を復元しています。このまま続きを入力してOKです。';
    if(result && result.dominant){ renderResult(result, false); }
  }
}

function buildResult(){
  const aCount = answers.filter(a => a === 'A').length;
  const bCount = questions.length - aCount;
  const aPct = Math.round((aCount / questions.length * 100) / 10) * 10;
  const bPct = 100 - aPct;
  const dominant = aCount > bCount ? 'A' : 'B';
  return {
    answers:[...answers],
    aCount,
    bCount,
    aPct,
    bPct,
    dominant,
    result: dominant === 'A' ? 'value' : 'vision',
    updatedAt: new Date().toISOString()
  };
}

function getResultMessage(payload){
  if(payload.dominant === 'A'){
    return {
      title:'価値観型寄り',
      note:'価値観型は、日々大切にしていることを積み上げていく中で納得感のあるキャリアを形成していくタイプです。\nまずは「価値観発掘」から、自分が大切にしたいことを言語化していくのがおすすめ。ここでは、自分に合う進め方のヒントが見えてきます。',
      href:'jikobunseki_katikan.html',
      cta:'価値観発掘に進む →'
    };
  }
  return {
    title:'ビジョン型寄り',
    note:'ビジョン型は、先に目指したい未来のイメージを描くことで行動しやすくなるタイプです。\nまずは「ビジョン発掘」から、1年後・3年後・5年後の将来像を言語化していくのがおすすめ。ここでは、自分に合う進め方のヒントが見えてきます。',
    href:'jikobunseki_vision.html',
    cta:'ビジョン発掘に進む →'
  };
}

function renderResult(payload, save = true){
  const config = getResultMessage(payload);
  document.getElementById('resultTitle').textContent = config.title;
  document.getElementById('resultBarA').style.width = payload.aPct + '%';
  document.getElementById('resultBarB').style.width = payload.bPct + '%';
  document.getElementById('labelA').textContent = `価値観型 ${payload.aPct}%`;
  document.getElementById('labelB').textContent = `ビジョン型 ${payload.bPct}%`;
  document.getElementById('resultNote').textContent = config.note;
  const nextCta = document.getElementById('nextCta');
  nextCta.href = config.href;
  nextCta.textContent = config.cta;
  resultPanel.style.display = 'block';
  resultPanel.scrollIntoView({behavior:'smooth', block:'start'});
  if(save){
    localStorage.setItem(診断結果_KEY, JSON.stringify(payload));
    saveDraft();
    document.getElementById('statusChip').textContent = '診断結果を入力しました';
    document.getElementById('statusText').innerHTML = 'タイプ診断の結果は <b>自己分析ページ</b> に反映されます。次は、今の自分に合う順番で次のページへ進めばOKです。';
  }
}

renderQuestions();
container.addEventListener('click', (e) => {
  const opt = e.target.closest('.option');
  if(!opt) return;
  const qi = +opt.dataset.q;
  const val = opt.dataset.v;
  answers[qi] = val;
  document.querySelectorAll(`.option[data-q="${qi}"]`).forEach(o => o.classList.remove('sel'));
  opt.classList.add('sel');
  updateProgress();
  saveDraft();
});

document.getElementById('saveDraftBtn').addEventListener('click', () => saveDraft(true));
submitBtn.addEventListener('click', () => {
  if(!submitBtn.classList.contains('ready')) return;
  const payload = buildResult();
  renderResult(payload, true);
});

restoreSavedData();
updateProgress();
</script>
</body>
</html>
